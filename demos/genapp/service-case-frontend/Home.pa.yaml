Screens:
  Home:
    Properties:
      Fill: =RGBA(245, 245, 245, 1)
      LoadingSpinnerColor: =RGBA(0, 120, 212, 1)
      OnVisible: |-
        =// Initialisiert die UI-Zustände für Suche und Filter.
        Set(locSearch, "");
        Set(locStatus, "Alle");
        // Lädt Demo-Daten in eine Collection, bis die Dataverse-Bindung gesetzt ist.
        If(
          CountRows(colCases) = 0,
          ClearCollect(
            colCases,
            {tt_title: "VPN Zugriff fehlt", tt_description: "Mitarbeiter kann sich nicht verbinden", tt_status: "Offen", tt_priority: "Hoch", tt_owner: "Lara"},
            {tt_title: "Outlook Synchronisation", tt_description: "Mails kommen verspätet an", tt_status: "In Bearbeitung", tt_priority: "Mittel", tt_owner: "Noah"},
            {tt_title: "Drucker im 3. Stock", tt_description: "Papierstau wird dauerhaft angezeigt", tt_status: "Erledigt", tt_priority: "Niedrig", tt_owner: "Mina"}
          )
        );
        // Setzt den initial ausgewählten Service Case für das Detailpanel.
        Set(gblSelectedCase, First(colCases))
    Children:
      - Root:
          Control: GroupContainer
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 245, 245, 1)
            Height: =Parent.Height
            Width: =Parent.Width
            LayoutDirection: =LayoutDirection.Vertical
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutGap: =12
            PaddingTop: =16
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
          Children:
            - HeaderRow:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  Height: =88
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =2
                  PaddingTop: =10
                  PaddingBottom: =10
                  PaddingLeft: =12
                  PaddingRight: =12
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                Children:
                  - lblTitle:
                      Control: Label
                      Properties:
                        FillPortions: =0
                        Text: ="Service Case Cockpit"
                        Size: =24
                        FontWeight: =FontWeight.Bold
                        Color: =RGBA(32, 31, 30, 1)
                        AutoHeight: =true
                  - lblSubTitle:
                      Control: Label
                      Properties:
                        FillPortions: =0
                        Text: ="Read-only Frontend für Manager (Desktop/Tablet)"
                        Size: =12
                        Color: =RGBA(96, 94, 92, 1)
                        AutoHeight: =true
            - FilterRow:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  Height: =64
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutGap: =12
                  PaddingTop: =10
                  PaddingBottom: =10
                  PaddingLeft: =12
                  PaddingRight: =12
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                Children:
                  - txtSearch:
                      Control: TextInput
                      Properties:
                        AccessibleLabel: ="Suche nach Service Case Titel"
                        Width: =420
                        FillPortions: =0
                        Placeholder: ="Suche nach Titel..."
                        Value: =locSearch
                        OnChange: |-
                          =// Aktualisiert den lokalen Suchtext.
                          Set(locSearch, Self.Value)
                  - drpStatus:
                      Control: DropDown
                      Properties:
                        AccessibleLabel: ="Statusfilter für Service Cases"
                        Width: =220
                        FillPortions: =0
                        Items: =["Alle", "Offen", "In Bearbeitung", "Erledigt"]
                        DefaultSelectedItems: =["Alle"]
                        OnChange: |-
                          =// Übernimmt den ausgewählten Statusfilter.
                          Set(locStatus, First(Self.SelectedItems).Value)
            - ContentRow:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(245, 245, 245, 1)
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =12
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                Children:
                  - CaseListCard:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =RGBA(255, 255, 255, 1)
                        FillPortions: =3
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =8
                        PaddingTop: =10
                        PaddingBottom: =10
                        PaddingLeft: =10
                        PaddingRight: =10
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                      Children:
                        - lblCases:
                            Control: Label
                            Properties:
                              FillPortions: =0
                              Text: ="Service Cases"
                              Size: =16
                              FontWeight: =FontWeight.Semibold
                              Color: =RGBA(0, 120, 212, 1)
                        - galCases:
                            Control: Gallery
                            Variant: Vertical
                            Properties:
                              AccessibleLabel: ="Liste der Service Cases"
                              TabIndex: =0
                              Fill: =RGBA(255, 255, 255, 1)
                              FillPortions: =1
                              TemplateSize: =100
                              Items: =Filter(colCases, StartsWith(tt_title, locSearch) && (locStatus = "Alle" || tt_status = locStatus))
                            Children:
                              - lblCaseTitle:
                                  Control: Label
                                  Properties:
                                    Text: =ThisItem.tt_title
                                    FontWeight: =FontWeight.Semibold
                                    Size: =14
                                    X: =10
                                    Y: =10
                                    Width: =380
                                    Height: =28
                              - lblCaseMeta:
                                  Control: Label
                                  Properties:
                                    Text: '=ThisItem.tt_status & " | Priorität: " & ThisItem.tt_priority & " | Owner: " & ThisItem.tt_owner'
                                    Size: =12
                                    Color: =RGBA(96, 94, 92, 1)
                                    X: =10
                                    Y: =44
                                    Width: =520
                                    Height: =24
                              - btnOpenCase:
                                  Control: Button
                                  Properties:
                                    AccessibleLabel: ="Öffnet die Detailansicht für diesen Service Case"
                                    Text: ="Details"
                                    X: =560
                                    Y: =28
                                    Width: =100
                                    Height: =32
                                    BasePaletteColor: =RGBA(0, 120, 212, 1)
                                    FontColor: =RGBA(255, 255, 255, 1)
                                    OnSelect: |-
                                      =// Setzt den aktiven Case und navigiert zur Detailansicht.
                                      Set(gblSelectedCase, ThisItem);
                                      Navigate(CaseDetails, ScreenTransition.Fade)
                  - CaseDetailCard:
                      Control: GroupContainer
                      Variant: AutoLayout
                      Properties:
                        Fill: =RGBA(255, 255, 255, 1)
                        FillPortions: =2
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =8
                        PaddingTop: =10
                        PaddingBottom: =10
                        PaddingLeft: =10
                        PaddingRight: =10
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                      Children:
                        - lblDetailTitle:
                            Control: Label
                            Properties:
                              FillPortions: =0
                              Text: ="Ausgewählter Service Case"
                              Size: =16
                              FontWeight: =FontWeight.Semibold
                              Color: =RGBA(0, 120, 212, 1)
                        - lblCaseName:
                            Control: Label
                            Properties:
                              FillPortions: =0
                              Text: =Coalesce(gblSelectedCase.tt_title, "Kein Case ausgewählt")
                              Size: =14
                              FontWeight: =FontWeight.Semibold
                              AutoHeight: =true
                        - lblCaseDesc:
                            Control: Label
                            Properties:
                              FillPortions: =0
                              Text: =Coalesce(gblSelectedCase.tt_description, "")
                              Size: =12
                              AutoHeight: =true
                        - lblCaseStatus:
                            Control: Label
                            Properties:
                              FillPortions: =0
                              Text: '="Status: " & Coalesce(gblSelectedCase.tt_status, "-")'
                              Size: =12
                        - lblCaseOwner:
                            Control: Label
                            Properties:
                              FillPortions: =0
                              Text: '="Owner: " & Coalesce(gblSelectedCase.tt_owner, "-")'
                              Size: =12
