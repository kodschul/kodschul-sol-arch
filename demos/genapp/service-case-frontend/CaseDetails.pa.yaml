Screens:
  CaseDetails:
    Properties:
      Fill: =RGBA(245, 245, 245, 1)
      LoadingSpinnerColor: =RGBA(0, 120, 212, 1)
    Children:
      - RootCaseDetails:
          Control: GroupContainer
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 245, 245, 1)
            Height: =Parent.Height
            Width: =Parent.Width
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =12
            PaddingTop: =16
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
          Children:
            - Header:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  Height: =64
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutGap: =12
                  PaddingTop: =8
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                Children:
                  - btnBackDetails:
                      Control: Button
                      Properties:
                        AccessibleLabel: ="Zurück zur Service Case Übersicht"
                        FillPortions: =0
                        Width: =120
                        Height: =36
                        Text: ="Zurück"
                        BasePaletteColor: =RGBA(0, 120, 212, 1)
                        FontColor: =RGBA(255, 255, 255, 1)
                        OnSelect: |-
                          =// Geht zurück zur Übersicht.
                          Navigate(Home, ScreenTransition.Fade)
                  - lblCaseDetailsHeader:
                      Control: Label
                      Properties:
                        FillPortions: =1
                        Text: ="Service Case Details"
                        Size: =20
                        FontWeight: =FontWeight.Bold
                        Color: =RGBA(32, 31, 30, 1)
            - Body:
                Control: GroupContainer
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =10
                  PaddingTop: =12
                  PaddingBottom: =12
                  PaddingLeft: =12
                  PaddingRight: =12
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                Children:
                  - lblCaseTitleDetails:
                      Control: Label
                      Properties:
                        FillPortions: =0
                        Text: =Coalesce(gblSelectedCase.tt_title, "Kein Case ausgewählt")
                        Size: =18
                        FontWeight: =FontWeight.Semibold
                        AutoHeight: =true
                  - lblStatus:
                      Control: Label
                      Properties:
                        FillPortions: =0
                        Text: '="Status: " & Coalesce(gblSelectedCase.tt_status, "-")'
                        Size: =13
                  - lblPriority:
                      Control: Label
                      Properties:
                        FillPortions: =0
                        Text: '="Priorität: " & Coalesce(gblSelectedCase.tt_priority, "-")'
                        Size: =13
                  - lblOwner:
                      Control: Label
                      Properties:
                        FillPortions: =0
                        Text: '="Owner: " & Coalesce(gblSelectedCase.tt_owner, "-")'
                        Size: =13
                  - lblDescriptionTitle:
                      Control: Label
                      Properties:
                        FillPortions: =0
                        Text: ="Beschreibung"
                        Size: =14
                        FontWeight: =FontWeight.Semibold
                        Color: =RGBA(0, 120, 212, 1)
                  - lblDescription:
                      Control: Label
                      Properties:
                        FillPortions: =0
                        Text: =Coalesce(gblSelectedCase.tt_description, "")
                        Size: =12
                        AutoHeight: =true
